services:
  backend:
    image: crpi-ff91b786rkkpt2fd.cn-guangzhou.personal.cr.aliyuncs.com/ai-novel-writing-assistant/ai-novel-writing-assistant:latest
    container_name: ai-novel-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ai_novel_data:/app/data
      - ai_novel_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ai-novel-net

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: ai-novel-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-novel-net

volumes:
  ai_novel_data:
  ai_novel_logs:
  qdrant_storage:

networks:
  ai-novel-net:
    driver: bridge
