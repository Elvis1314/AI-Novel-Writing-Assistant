services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-novel-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      ALLOW_LAN: "true"
      CORS_ORIGIN: "http://localhost:5173"
      DATABASE_URL: "file:/app/data/dev.db"
      RAG_ENABLED: "false"
      VITE_API_BASE_URL: "http://localhost:3000/api"
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: "https://api.openai.com/v1"
      OPENAI_MODEL: "gpt-4o-mini"
      DEEPSEEK_API_KEY: ""
      DEEPSEEK_BASE_URL: "https://api.deepseek.com/v1"
      DEEPSEEK_MODEL: "deepseek-chat"
    volumes:
      - ai_novel_data:/app/data
      - ai_novel_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-novel-net

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: ai-novel-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-novel-net

volumes:
  ai_novel_data:
  ai_novel_logs:
  qdrant_storage:

networks:
  ai-novel-net:
    driver: bridge
